<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nerve — A local-first workspace for notes, tasks, and a graph that's actually yours</title>
<meta name="description" content="Nerve combines a distraction-free rich editor, bi-directional linking, a recurring-task kanban, and a calendar — with all data stored locally on your device. No account. No cloud lock-in.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Theme tokens — single source of truth for color & radius
   ============================================================ */
:root {
  --bg: #ffffff;
  --bg-subtle: #fafafa;
  --bg-elevated: #ffffff;
  --bg-inset: #f4f4f5;
  --text: #18181b;
  --text-secondary: #52525b;
  --text-tertiary: #71717a;
  --border: #e7e7eb;
  --border-strong: #d4d4d8;
  --accent: #4f46e5;
  --accent-hover: #4338ca;
  --accent-subtle: #eef2ff;
  --accent-text: #4f46e5;
  --green: #16a34a;
  --green-subtle: #dcfce7;
  --amber: #d97706;
  --amber-subtle: #fef3c7;
  --rose: #e11d48;
  --rose-subtle: #ffe4e6;
  --blue: #2563eb;
  --blue-subtle: #dbeafe;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 24px 64px -16px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.04);
  --radius-sm: 6px;
  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
}

[data-theme="dark"] {
  --bg: #0a0a0b;
  --bg-subtle: #111113;
  --bg-elevated: #18181b;
  --bg-inset: #1f1f23;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-tertiary: #71717a;
  --border: #27272a;
  --border-strong: #3f3f46;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-subtle: rgba(99, 102, 241, 0.14);
  --accent-text: #a5b4fc;
  --green: #22c55e;
  --green-subtle: rgba(34, 197, 94, 0.16);
  --amber: #f59e0b;
  --amber-subtle: rgba(245, 158, 11, 0.16);
  --rose: #f43f5e;
  --rose-subtle: rgba(244, 63, 94, 0.16);
  --blue: #3b82f6;
  --blue-subtle: rgba(59, 130, 246, 0.16);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 24px 64px -16px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.3);
}

/* ============================================================
   Reset & base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.3s ease, color 0.3s ease;
}
h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.025em; color: var(--text); }
h1 { font-size: clamp(2.25rem, 5.5vw, 4rem); line-height: 1.05; letter-spacing: -0.04em; font-weight: 700; }
h2 { font-size: clamp(1.875rem, 3.5vw, 2.75rem); line-height: 1.1; letter-spacing: -0.03em; }
h3 { font-size: 1.375rem; line-height: 1.3; letter-spacing: -0.02em; }
p { margin: 0; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
img, svg { display: block; max-width: 100%; }

::selection { background: var(--accent-subtle); color: var(--text); }

/* ============================================================
   Layout primitives
   ============================================================ */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}
@media (min-width: 768px) {
  .container { padding: 0 40px; }
}
section { padding: 72px 0; }
@media (min-width: 768px) { section { padding: 120px 0; } }

.section-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent-text);
  margin-bottom: 16px;
}
.section-eyebrow::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--accent-text);
  opacity: 0.6;
}
.section-title {
  max-width: 28ch;
}
.section-lead {
  margin-top: 16px;
  max-width: 60ch;
  font-size: 1.0625rem;
  line-height: 1.65;
  color: var(--text-secondary);
}
@media (min-width: 768px) { .section-lead { font-size: 1.125rem; } }

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  font-size: 0.875rem;
  font-weight: 500;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  text-decoration: none;
  font-family: inherit;
}
.btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.btn--primary {
  background: var(--accent);
  color: #ffffff;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.btn--primary:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
}
.btn--secondary {
  background: var(--bg);
  color: var(--text);
  border-color: var(--border-strong);
}
.btn--secondary:hover {
  border-color: var(--text-secondary);
  background: var(--bg-subtle);
}
.btn--ghost {
  background: transparent;
  color: var(--text-secondary);
}
.btn--ghost:hover {
  color: var(--text);
  background: var(--bg-subtle);
}
.btn--lg { padding: 13px 22px; font-size: 0.9375rem; }
.btn--block { width: 100%; }
.btn:disabled, .btn--disabled {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

/* ============================================================
   Nav
   ============================================================ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: color-mix(in srgb, var(--bg) 78%, transparent);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}
.nav__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.nav__logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 1.0625rem;
  letter-spacing: -0.02em;
  color: var(--text);
}
.nav__logo-mark {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  color: var(--accent);
}
.nav__links {
  display: none;
  align-items: center;
  gap: 28px;
}
@media (min-width: 768px) { .nav__links { display: flex; } }
.nav__link {
  font-size: 0.875rem;
  color: var(--text-secondary);
  transition: color 0.15s;
}
.nav__link:hover { color: var(--text); }
.nav__actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav__cta { display: none; }
@media (min-width: 640px) { .nav__cta { display: inline-flex; } }

/* ============================================================
   Theme toggle
   ============================================================ */
.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.theme-toggle:hover {
  color: var(--text);
  border-color: var(--border-strong);
  background: var(--bg-subtle);
}
.theme-toggle svg { width: 16px; height: 16px; }
.theme-toggle__sun { display: none; }
.theme-toggle__moon { display: block; }
[data-theme="dark"] .theme-toggle__sun { display: block; }
[data-theme="dark"] .theme-toggle__moon { display: none; }

/* ============================================================
   Hero
   ============================================================ */
.hero {
  padding: 112px 0 64px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
@media (min-width: 768px) { .hero { padding: 152px 0 96px; } }

.hero__bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.hero__bg::before {
  content: '';
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 1200px;
  height: 600px;
  background: radial-gradient(ellipse at center, var(--accent-subtle) 0%, transparent 60%);
  opacity: 0.7;
}
.hero__inner { position: relative; z-index: 1; }

.hero__pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  font-size: 0.8125rem;
  color: var(--text-secondary);
  margin-bottom: 28px;
  box-shadow: var(--shadow-sm);
}
.hero__pill-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px var(--green-subtle);
}
.hero__pill-version {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-inset);
  color: var(--text-tertiary);
  margin-left: 4px;
}

.hero__headline {
  max-width: 18ch;
  margin: 0 auto;
}
.hero__headline em {
  font-style: normal;
  color: var(--accent-text);
  font-weight: 700;
}
.hero__sub {
  max-width: 56ch;
  margin: 24px auto 0;
  font-size: 1.125rem;
  line-height: 1.6;
  color: var(--text-secondary);
}
@media (min-width: 768px) { .hero__sub { font-size: 1.25rem; } }

.hero__ctas {
  margin-top: 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}
.hero__platforms {
  margin-top: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 0.8125rem;
  color: var(--text-tertiary);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}
.hero__platforms span { color: var(--text-tertiary); }
.hero__platforms svg { width: 14px; height: 14px; opacity: 0.7; }

.hero__visual {
  margin-top: 72px;
  position: relative;
  z-index: 1;
}

/* ============================================================
   App window (used for hero + feature mocks)
   ============================================================ */
.app-window {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.app-window__bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
}
.app-window__dots {
  display: flex;
  gap: 6px;
}
.app-window__dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.06);
}
[data-theme="dark"] .app-window__dot { border-color: rgba(255,255,255,0.04); }
.app-window__dot--red { background: #ff5f57; }
.app-window__dot--yellow { background: #febc2e; }
.app-window__dot--green { background: #28c840; }
.app-window__title {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  font-weight: 500;
  flex: 1;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}

/* Hero composite visual */
.hero-composite {
  display: flex;
  height: 480px;
}
@media (min-width: 768px) { .hero-composite { height: 540px; } }

.hero-composite__sidebar {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 8px;
  width: 56px;
  border-right: 1px solid var(--border);
  background: var(--bg-subtle);
}
@media (min-width: 768px) { .hero-composite__sidebar { display: flex; } }
.hero-composite__sidebar-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  color: var(--text-tertiary);
}
.hero-composite__sidebar-icon--active {
  background: var(--accent-subtle);
  color: var(--accent-text);
}
.hero-composite__sidebar-icon svg { width: 16px; height: 16px; }

.hero-composite__notelist {
  display: none;
  flex-direction: column;
  width: 200px;
  border-right: 1px solid var(--border);
  padding: 8px;
  background: var(--bg);
}
@media (min-width: 768px) { .hero-composite__notelist { display: flex; } }
.notelist__header {
  padding: 8px 8px 12px;
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.notelist__item {
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.8125rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.notelist__item:hover { background: var(--bg-subtle); }
.notelist__item--active {
  background: var(--accent-subtle);
  color: var(--accent-text);
  font-weight: 500;
}
.notelist__item-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-tertiary);
  flex-shrink: 0;
}
.notelist__item--active .notelist__item-dot { background: var(--accent-text); }

.hero-composite__main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.hero-composite__editor {
  flex: 1.1;
  padding: 24px;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.hero-composite__graph {
  flex: 1;
  position: relative;
  background: var(--bg-subtle);
  overflow: hidden;
}

/* On mobile, stack editor + graph */
@media (max-width: 767px) {
  .hero-composite { flex-direction: column; height: auto; }
  .hero-composite__editor { padding: 16px; border-bottom: 1px solid var(--border); }
  .hero-composite__graph { height: 240px; flex: none; }
}

/* ============================================================
   Editor mock
   ============================================================ */
.editor-mock__title {
  font-size: 1.375rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  color: var(--text);
}
.editor-mock__heading {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text);
  margin-top: 16px;
  margin-bottom: 8px;
}
.editor-mock__p {
  font-size: 0.8125rem;
  line-height: 1.65;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.editor-mock__ul {
  list-style: none;
  padding: 0;
  margin: 0 0 8px;
}
.editor-mock__li {
  font-size: 0.8125rem;
  line-height: 1.65;
  color: var(--text-secondary);
  padding-left: 16px;
  position: relative;
  margin-bottom: 4px;
}
.editor-mock__li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 9px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text-tertiary);
}
.editor-mock__strong { font-weight: 600; color: var(--text); }
.editor-mock__em { font-style: italic; }
.editor-mock__color { color: var(--accent-text); font-weight: 500; }
.editor-mock__color--rose { color: var(--rose); }
.editor-mock__color--green { color: var(--green); }

.wikilink {
  display: inline;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--accent-subtle);
  color: var(--accent-text);
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.15s;
}
.wikilink:hover { background: var(--accent); color: white; }
.wikilink::before { content: '[['; opacity: 0.5; }
.wikilink::after { content: ']]'; opacity: 0.5; }

/* ============================================================
   Graph mock
   ============================================================ */
.graph-mock {
  width: 100%;
  height: 100%;
  position: relative;
}
.graph-mock svg { width: 100%; height: 100%; }
.graph-node {
  fill: var(--bg-elevated);
  stroke: var(--text-tertiary);
  stroke-width: 1.5;
  transition: fill 0.2s, stroke 0.2s;
}
.graph-node--accent {
  fill: var(--accent);
  stroke: var(--accent);
}
.graph-node--muted {
  fill: var(--bg-elevated);
  stroke: var(--border-strong);
}
.graph-edge {
  stroke: var(--border-strong);
  stroke-width: 1;
  fill: none;
}
.graph-edge--active {
  stroke: var(--accent);
  stroke-width: 1.5;
  opacity: 0.6;
}
.graph-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: var(--text-tertiary);
  pointer-events: none;
}
.graph-label--accent { fill: var(--accent-text); font-weight: 600; }

@keyframes float-a {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(2px, -2px); }
}
@keyframes float-b {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-2px, 2px); }
}
@keyframes float-c {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-3px, -1px); }
}
@keyframes pulse-ring {
  0% { r: var(--r); opacity: 0.4; }
  100% { r: calc(var(--r) * 2.2); opacity: 0; }
}
.graph-node-group { animation-duration: 6s; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
.graph-node-group--a { animation-name: float-a; }
.graph-node-group--b { animation-name: float-b; animation-duration: 7s; }
.graph-node-group--c { animation-name: float-c; animation-duration: 8s; }
.graph-pulse-ring { animation: pulse-ring 2.4s ease-out infinite; }

@media (prefers-reduced-motion: reduce) {
  .graph-node-group, .graph-pulse-ring { animation: none !important; }
}

/* ============================================================
   Problem framing strip
   ============================================================ */
.problem {
  padding: 56px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
}
.problem__inner {
  max-width: 880px;
  margin: 0 auto;
  text-align: center;
}
.problem__text {
  font-size: 1.0625rem;
  line-height: 1.7;
  color: var(--text-secondary);
}
@media (min-width: 768px) { .problem__text { font-size: 1.25rem; } }
.problem__text strong {
  color: var(--text);
  font-weight: 600;
}
.problem__text .strike {
  text-decoration: line-through;
  text-decoration-color: var(--rose);
  text-decoration-thickness: 2px;
  color: var(--text-tertiary);
}

/* ============================================================
   Feature blocks
   ============================================================ */
.features { padding: 96px 0; }
@media (min-width: 768px) { .features { padding: 140px 0; } }

.features__header {
  max-width: 720px;
  margin-bottom: 80px;
}
@media (min-width: 768px) { .features__header { margin-bottom: 112px; } }

.feature {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
  align-items: center;
  margin-bottom: 96px;
}
@media (min-width: 1024px) {
  .feature {
    grid-template-columns: 1fr 1.1fr;
    gap: 80px;
    margin-bottom: 140px;
  }
  .feature:last-child { margin-bottom: 0; }
  .feature--reverse .feature__media { order: -1; }
}
.feature__tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent-text);
  margin-bottom: 16px;
}
.feature__tag::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--accent-text);
  opacity: 0.5;
}
.feature__title {
  font-size: 1.875rem;
  line-height: 1.15;
  letter-spacing: -0.025em;
  margin-bottom: 16px;
}
@media (min-width: 768px) { .feature__title { font-size: 2.25rem; } }
.feature__body {
  font-size: 1.0625rem;
  line-height: 1.65;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.feature__bullets {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.feature__bullet {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.9375rem;
  color: var(--text-secondary);
}
.feature__bullet svg {
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  color: var(--accent);
  margin-top: 3px;
}
.feature__media {
  position: relative;
}

/* ============================================================
   Backlinks mock
   ============================================================ */
.backlinks-mock {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.backlinks-mock__editor {
  padding: 24px;
  border-right: 1px solid var(--border);
}
.backlinks-mock__panel {
  padding: 20px;
  background: var(--bg-subtle);
  display: flex;
  flex-direction: column;
}
.backlinks-mock__panel-title {
  font-size: 0.6875rem;
  font-weight: 600;
    
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.backlinks-mock__panel-title svg { width: 12px; height: 12px; }
.backlinks-mock__panel-count {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  background: var(--bg-inset);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--text-secondary);
}
.backlink-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.backlink-item:hover { border-color: var(--border-strong); }
.backlink-item__title {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}
.backlink-item__ctx {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  line-height: 1.5;
}
.backlink-item__ctx em {
  font-style: normal;
  background: var(--accent-subtle);
  color: var(--accent-text);
  padding: 1px 4px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
}

@media (max-width: 640px) {
  .backlinks-mock { grid-template-columns: 1fr; }
  .backlinks-mock__editor { border-right: none; border-bottom: 1px solid var(--border); }
}

/* ============================================================
   Kanban mock
   ============================================================ */
.kanban-mock {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.kanban-mock__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
}
.kanban-mock__title {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text);
}
.kanban-mock__filter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  color: var(--text-tertiary);
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--bg-inset);
}
.kanban-mock__cols {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--border);
}
@media (min-width: 640px) {
  .kanban-mock__cols { grid-template-columns: repeat(4, 1fr); }
}
.kanban-col {
  background: var(--bg-subtle);
  padding: 12px;
  min-height: 280px;
}
.kanban-col__header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}
.kanban-col__dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.kanban-col__dot--todo { background: var(--text-tertiary); }
.kanban-col__dot--doing { background: var(--amber); }
.kanban-col__dot--done { background: var(--green); }
.kanban-col__dot--skipped { background: var(--rose); opacity: 0.6; }
.kanban-col__count {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  color: var(--text-tertiary);
}
.kanban-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
}
.kanban-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
}
.kanban-card__title {
  font-size: 0.8125rem;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 6px;
}
.kanban-card--done .kanban-card__title {
  color: var(--text-tertiary);
  text-decoration: line-through;
}
.kanban-card--skipped .kanban-card__title {
  color: var(--text-tertiary);
}
.kanban-card__meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.kanban-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.625rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bg-inset);
  color: var(--text-tertiary);
}
.kanban-tag--green { background: var(--green-subtle); color: var(--green); }
.kanban-tag--blue { background: var(--blue-subtle); color: var(--blue); }
.kanban-tag--amber { background: var(--amber-subtle); color: var(--amber); }
.kanban-recurring {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.625rem;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--accent-subtle);
  color: var(--accent-text);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.kanban-recurring svg { width: 10px; height: 10px; }

/* ============================================================
   Calendar mock
   ============================================================ */
.calendar-mock {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.calendar-mock__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
}
.calendar-mock__month {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text);
}
.calendar-mock__nav {
  display: flex;
  gap: 4px;
}
.calendar-mock__nav-btn {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-elevated);
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 0.75rem;
}
.calendar-mock__weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
}
.calendar-mock__weekday {
  padding: 8px 4px;
  font-size: 0.625rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  text-align: center;
}
.calendar-mock__grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 1fr;
}
.calendar-day {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 6px;
  min-height: 64px;
  position: relative;
}
.calendar-day:nth-child(7n) { border-right: none; }
.calendar-day--out { background: var(--bg-subtle); }
.calendar-day__num {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.calendar-day--out .calendar-day__num { color: var(--text-tertiary); opacity: 0.4; }
.calendar-day--today .calendar-day__num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-weight: 600;
  margin-left: -3px;
  margin-top: -3px;
}
.calendar-event {
  font-size: 0.625rem;
  padding: 2px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 4px;
}
.calendar-event::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.calendar-event--accent { background: var(--accent-subtle); color: var(--accent-text); }
.calendar-event--green { background: var(--green-subtle); color: var(--green); }
.calendar-event--amber { background: var(--amber-subtle); color: var(--amber); }
.calendar-event--blue { background: var(--blue-subtle); color: var(--blue); }
.calendar-event--rose { background: var(--rose-subtle); color: var(--rose); }

/* ============================================================
   Trust / local-first section
   ============================================================ */
.trust {
  background: var(--bg-subtle);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.trust__grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
  align-items: center;
  margin-top: 64px;
}
@media (min-width: 1024px) {
  .trust__grid {
    grid-template-columns: 1.05fr 1fr;
    gap: 80px;
  }
}
.trust__points {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}
@media (min-width: 480px) { .trust__points { grid-template-columns: 1fr 1fr; } }
.trust-point__icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: var(--radius);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--accent);
  margin-bottom: 14px;
}
.trust-point__icon svg { width: 18px; height: 18px; }
.trust-point__title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.trust-point__body {
  font-size: 0.875rem;
  color: var(--text-secondary);
  line-height: 1.55;
}

.trust__visual {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.trust__visual-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
}
.trust__visual-path {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-tertiary);
  flex: 1;
}
.trust__visual-path .tilde { color: var(--accent-text); }
.trust__visual-body {
  padding: 20px 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8125rem;
  line-height: 1.85;
  color: var(--text-secondary);
  background: var(--bg);
}
.trust-file__name { color: var(--text); }
.trust-file__indent { padding-left: 20px; }
.trust-file__indent--2 { padding-left: 40px; }
.trust-file__comment { color: var(--text-tertiary); }
.trust-file__accent { color: var(--accent-text); }

/* ============================================================
   How it works
   ============================================================ */
.howitworks__steps {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
  margin-top: 64px;
}
@media (min-width: 768px) { .howitworks__steps { grid-template-columns: repeat(4, 1fr); gap: 24px; } }

.step {
  padding: 24px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-elevated);
  position: relative;
}
.step__num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  color: var(--accent-text);
  margin-bottom: 16px;
}
.step__icon {
  width: 32px;
  height: 32px;
  margin-bottom: 16px;
  color: var(--text);
}
.step__title {
  font-size: 1.0625rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.015em;
}
.step__body {
  font-size: 0.875rem;
  color: var(--text-secondary);
  line-height: 1.55;
}
.step__arrow {
  display: none;
  position: absolute;
  right: -16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--border-strong);
  z-index: 1;
}
@media (min-width: 768px) {
  .step:not(:last-child) .step__arrow { display: block; }
}

/* ============================================================
   Download section
   ============================================================ */
.download {
  background: var(--bg-subtle);
  border-top: 1px solid var(--border);
}
.download__header {
  text-align: center;
  max-width: 720px;
  margin: 0 auto 64px;
}
.download__title { margin: 0 auto; max-width: 18ch; }
.download__sub {
  margin: 20px auto 0;
  font-size: 1.125rem;
  color: var(--text-secondary);
  max-width: 52ch;
}
.download__cards {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  max-width: 1080px;
  margin: 0 auto;
}
@media (min-width: 640px) { .download__cards { grid-template-columns: 1fr 1fr; } }
@media (min-width: 1024px) { .download__cards { grid-template-columns: repeat(3, 1fr); } }

.dl-card {
  display: flex;
  flex-direction: column;
  padding: 24px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-elevated);
  transition: border-color 0.2s, transform 0.2s;
}
.dl-card:hover { border-color: var(--border-strong); }
.dl-card--soon {
  opacity: 0.7;
}
.dl-card__top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.dl-card__icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: var(--radius);
  background: var(--bg-inset);
  color: var(--text);
}
.dl-card__icon svg { width: 22px; height: 22px; }
.dl-card__name {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}
.dl-card__meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  color: var(--text-tertiary);
  margin-top: 2px;
}
.dl-card__body {
  font-size: 0.8125rem;
  color: var(--text-secondary);
  margin-bottom: 20px;
  flex: 1;
  line-height: 1.55;
}
.dl-card__action {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  background: var(--bg);
  color: var(--text);
  font-size: 0.8125rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.dl-card__action:hover {
  background: var(--bg-subtle);
  border-color: var(--text-secondary);
}
.dl-card__action svg { width: 14px; height: 14px; }
.dl-card__action--soon {
  background: transparent;
  border-style: dashed;
  color: var(--text-tertiary);
  cursor: not-allowed;
}
.dl-card__action--soon:hover { background: transparent; border-color: var(--border-strong); }

.download__footnote {
  text-align: center;
  margin-top: 40px;
  font-size: 0.8125rem;
  color: var(--text-tertiary);
}
.download__footnote a { color: var(--accent-text); }
.download__footnote a:hover { text-decoration: underline; }

/* ============================================================
   Footer
   ============================================================ */
.footer {
  border-top: 1px solid var(--border);
  padding: 56px 0 40px;
}
.footer__top {
  display: flex;
  flex-direction: column;
  gap: 32px;
  margin-bottom: 40px;
}
@media (min-width: 768px) {
  .footer__top { flex-direction: row; justify-content: space-between; align-items: flex-start; }
}
.footer__brand {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 320px;
}
.footer__logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 1.0625rem;
  color: var(--text);
}
.footer__logo-mark { color: var(--accent); display: flex; }
.footer__tag {
  font-size: 0.875rem;
  color: var(--text-secondary);
  line-height: 1.55;
}
.footer__links {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px 48px;
}
@media (min-width: 768px) {
  .footer__links { grid-template-columns: repeat(4, 1fr); }
}
.footer__col-title {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}
.footer__link {
  display: block;
  font-size: 0.875rem;
  color: var(--text-secondary);
  padding: 4px 0;
  transition: color 0.15s;
}
.footer__link:hover { color: var(--text); }
.footer__bottom {
  padding-top: 32px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
  font-size: 0.8125rem;
  color: var(--text-tertiary);
}
@media (min-width: 768px) {
  .footer__bottom { flex-direction: row; justify-content: space-between; align-items: center; }
}
.footer__bottom-links {
  display: flex;
  gap: 20px;
}
.footer__bottom-link {
  color: var(--text-tertiary);
  transition: color 0.15s;
}
.footer__bottom-link:hover { color: var(--text); }

/* ============================================================
   Reveal animation
   ============================================================ */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.7s cubic-bezier(0.2, 0, 0, 1), transform 0.7s cubic-bezier(0.2, 0, 0, 1);
}
.reveal.is-visible {
  opacity: 1;
  transform: none;
}
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
  html { scroll-behavior: auto; }
}

/* ============================================================
   Mobile nav (no off-canvas, just hide links)
   ============================================================ */
@media (max-width: 767px) {
  .nav__links { display: none; }
}

/* ============================================================
   Hooks
   ============================================================ */
const useTheme = () => {
  const [theme, setTheme] = useState(() => {
    try {
      const saved = localStorage.getItem('nerve-theme');
      if (saved === 'light' || saved === 'dark') return saved;
    } catch (e) {}
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  });

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('nerve-theme', theme); } catch (e) {}
  }, [theme]);

  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return { theme, toggle };
};

const useReveal = (options = {}) => {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const node = ref.current;
    if (!node) return;
    if (typeof IntersectionObserver === 'undefined') { setVisible(true); return; }
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setVisible(true);
        observer.disconnect();
      }
    }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px', ...options });
    observer.observe(node);
    return () => observer.disconnect();
  }, []);
  return [ref, visible];
};

const ThemeToggle = () => {
  const { theme, toggle } = useTheme();
  return (
    <button
      className="theme-toggle"

      title={theme === 'dark' ? 'Light mode' : 'Dark mode'}
    >
      <span className="theme-toggle__sun"><Icons.Sun /></span>
      <span className="theme-toggle__moon"><Icons.Moon /></span>

  );
};

    { id: 'b', x: 180, y: 60,  r: 6,  label: 'Sync arch',    accent: false, anim: 'b' },
    { id: 'c', x: 280, y: 90,  r: 7,  label: 'Graph view',   accent: false, anim: 'c' },
    { id: 'd', x: 130, y: 160, r: 5,  label: 'Maya Chen',    accent: false, anim: 'a' },
    { id: 'e', x: 230, y: 180, r: 6,  label: 'Weekly rev',   accent: false, anim: 'b' },
    { id: 'f', x: 330, y: 200, r: 5,  label: 'v0.5',         accent: false, anim: 'c' },
    { id: 'g', x: 60,  y: 220, r: 4,  label: '',             accent: false, anim: 'a' },
    { id: 'h', x: 320, y: 40,  r: 4,  label: '',             accent: false, anim: 'b' },
    { id: 'i', x: 180, y: 250, r: 5,  label: 'Automerge',    accent: false, anim: 'c' },
    { id: 'j', x: 280, y: 260, r: 4,  label: '',             accent: false, anim: 'a' },
  ];
  const edges = [
    ['a','b'], ['a','c'], ['a','d'], ['b','c'], ['b','e'],
    ['c','f'], ['d','e'], ['e','f'], ['e','i'], ['c','h'],
    ['a','g'], ['e','j'], ['b','i'],
  ];
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

  return (
    <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <radialGradient id="pulse-grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
        </radialGradient>
      </defs>
      {/* Edges */}
      {edges.map(([from, to], i) => {
        const f = nodeMap[from], t = nodeMap[to];
        const isActive = from === 'a' || to === 'a';
        return (
          <line
            key={`e-${i}`}
            x1={f.x} y1={f.y} x2={t.x} y2={t.y}
            className={`graph-edge${isActive ? ' graph-edge--active' : ''}`}

            className={`graph-node${n.accent ? ' graph-node--accent' : ' graph-node--muted'}`}
          />
          {n.label && (
            <text
              x={n.x} y={n.y - n.r - 6}
              textAnchor="middle"
              className={`graph-label${n.accent ? ' graph-label--accent' : ''}`}
            >
              {n.label}
            </text>
          )}
        </g>
      ))}
    </svg>
  );
};

/* ============================================================
   Feature: Calendar mock
   ============================================================ */
const CalendarMock = () => {
  const weekdays = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  // August 2025 — starts on Friday (day 5)
  const monthStart = 5;
  const daysInMonth = 31;
  const daysInPrev = 31; // July
  const today = 14;

  const events = {
    4: [{ label: '1:1 Maya', color: 'accent' }],
    6: [{ label: 'Sprint plan', color: 'blue' }],
    12: [{ label: 'Weekly review', color: 'green' }, { label: 'v0.5 sync', color: 'accent' }],
    14: [{ label: 'v0.5 release', color: 'rose' }, { label: 'Launch post', color: 'amber' }],
    18: [{ label: 'Design rev', color: 'blue' }],
    22: [{ label: 'Weekly review', color: 'green' }],
    26: [{ label: 'Hiring loop', color: 'amber' }],
    28: [{ label: 'Beta sync', color: 'accent' }],
  };

  const cells = [];
  // Prev month tail
  for (let i = monthStart - 1; i >= 0; i--) {
    cells.push({ day: daysInPrev - i, out: true });
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, out: false, today: d === today, events: events[d] || [] });
  }
  // Next month head — fill to 42
  let nextDay = 1;
  while (cells.length < 42) {
    cells.push({ day: nextDay++, out: true });
  }

  return (
    <div className="calendar-mock">
      <div className="calendar-mock__header">
        <div className="calendar-mock__month">August 2025</div>
        <div className="calendar-mock__nav">
          <div className="calendar-mock__nav-btn">‹</div>
          <div className="calendar-mock__nav-btn">›</div>
        </div>
      </div>
      <div className="calendar-mock__weekdays">
        {weekdays.map((d, i) => <div className="calendar-mock__weekday" key={i}>{d}</div>)}
      </div>
      <div className="calendar-mock__grid">
        {cells.map((cell, i) => (
          <div
            className={`calendar-day${cell.out ? ' calendar-day--out' : ''}${cell.today ? ' calendar-day--today' : ''}`}
            key={i}
          >
            <div className="calendar-day__num">{cell.day}</div>
            {cell.events && cell.events.map((ev, j) => (
              <div className={`calendar-event calendar-event--${ev.color}`} key={j}>{ev.label}</div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
};

const App = () => {
  // Initialize theme on mount (useTheme runs inside ThemeToggle, but
  // we also want to set the document attribute as early as possible).
  useEffect(() => {
    // The ThemeToggle's useTheme handles this, but as a safety net:
    try {
      const saved = localStorage.getItem('nerve-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    } catch (e) {}
  }, []);

  return (
    <React.Fragment>
      <Nav />
      <main>
        <Hero />
        <ProblemFraming />
        <FeatureShowcase />
        <TrustSection />
        <HowItWorks />
        <DownloadSection />
      </main>
      <Footer />
    </React.Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
